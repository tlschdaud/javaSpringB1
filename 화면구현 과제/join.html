<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,user-xcalable=yes, initial-scale=1.0,maximum-scale=3.0,minimum-scale=0.5">
        <title>닭컴</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css">
        <link rel="stylesheet" type="text/css" href="css/join.css">
        <script src="js/common.js"></script>
    </head>
    <body>
        <header>
            <section class="left">
                <a href="#">
                    <i class="xi-bars"></i>
                </a>
                <a href="#">
                    <i class="xi-search"></i>
                </a>
            </section>
            <section class="logo">
                <a href="index.html">
                    <img src="images/logo-pc-gif.gif" alt="메인 로고">
                </a>
            </section>
            <section class="util">
                <i class="xi-lock-o"></i>
                <a href="login.html">로그인</a>
                <a href="#">회원가입</a>
                <a href="#">주문조회</a>
                <a href="#">고객센터</a>
            </section>
            <section class="right">
                <a href="#">
                    <i class="xi-user-o"></i>
                </a>
                <a href="#">
                    <i class="xi-cart-o"></i>
                </a>
            </section>
            
        </header>
        <nav>
            <a href="#">카테고리</a>
            <a href="#">랭킹</a>
            <a href="#">브랜드관</a>
            <a href="#">이벤트</a>
            <a href="#">혜택정리</a>
        </nav>
        <main>
            <div>
                <form method="POST" action="index.html" id="join-form" >
                    <h2>회원가입</h2>
                    <dl>
                        <dt>구분</dt>
                        <dd>
                            <label>
                                <input type="radio" name="type" value="private" >개인회원
                            </label>
                            <label>
                                <input type="radio" name="type" value="business">사업자회원
                            </label>
                        </dd>
                    </dl>
                    <dl>
                        <dt>아이디</dt>
                        <dd>
                            <input type="text" name="userId" placeholder="아이디">
                        </dd>
                    </dl>
                    <dl>
                        <dt>비밀번호</dt>
                        <dd>
                            <input type="password" name="userPw" placeholder="비밀번호">
                        </dd>
                    </dl>
                    <dl>
                        <dt>비밀번호 확인</dt>
                        <dd>
                            <input type="password" name="userPwRe" placeholder="비밀번호">
                        </dd>
                    </dl>
                    <dl>
                        <dt>이름</dt>
                        <dd>
                            <input type="text" name="userNm">
                        </dd>
                    </dl>
                
                    <dl>
                        <dt>생년월일</dt>
                        <dd>
                            <input type="date" name="birthDt">
                        </dd>
                    </dl>
                    <dl>
                        <dt>이메일</dt>
                        <dd>
                            <input type="text" name="email">@
                            <select name="domain">
                                <option value="naver.com">naver.com</option>
                                <option value="daum.net">naver.com</option>
                                <option value="gmail.com">gmail.com</option>
                                <option value="" selected>직접입력</option>
                            </select>
                        </dd>
                    </dl>
                    <!--
                    <input type="submit" value="가입하기">
                    <input type="reset" value="다시입력">
                    -->
                    <button type="submit">가입하기</button>
                    <button type="reset">다시입력</button>
                </form>
            </div>

            <section class="quick">
                <img src="images/button-1569572820.png" alt="퀵메뉴">
            </section>
            
        </main>
        <footer>
            <section class="footer">
                <div class="inner">
                    <div class="contentWrapFooter">
                        <div class="footerContent1">
                            <ul class="util">
                                <li>
                                    <a href="#">회사소개</a>
                                    <span class="bar"> | </span>
                                </li>
                                <li>
                                    <a href="#">이용약관</a>
                                    <span class="bar"> | </span>
                                </li>
                                <li>
                                    <a href="#">개인정보 취급방침</a>
                                    <span class="bar"> | </span>
                                </li>
                                <li>
                                    <a href="#">이용안내</a>
                                    <span class="bar"> | </span>
                                </li>
                </section>
            </footer>
    </body>
</html>
